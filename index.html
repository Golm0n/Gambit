<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHESS DOPAMINE - OPENING ROULETTE</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff6600;
            --secondary: #9d00ff;
            --bg: #050505;
            --card-bg: #151515;
            --text: #ffffff;
            --rare: #4b69ff;
            --epic: #8847ff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 20px var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .roulette-container {
            position: relative;
            width: 90vw;
            max-width: 900px;
            height: 160px;
            background: var(--card-bg);
            border: 5px solid #333;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 102, 0, 0.1);
        }

        .marker {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #fff;
            z-index: 100;
            box-shadow: 0 0 20px #fff;
            transform: translateX(-50%);
        }

        .strip {
            display: flex;
            position: absolute;
            left: 0;
            top: 10px;
            transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1);
        }

        .opening-card {
            width: 180px;
            height: 130px;
            margin: 0 5px;
            background: #222;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-bottom: 6px solid #444;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .opening-name { font-size: 0.8rem; margin-top: 10px; text-transform: uppercase; }
        .opening-icon { font-size: 2.5rem; }

        .rare { border-bottom-color: var(--rare); }
        .epic { border-bottom-color: var(--epic); }
        .common { border-bottom-color: #666; }
        .gambit { border-bottom-color: var(--primary); background: linear-gradient(to top, rgba(255, 102, 0, 0.2), transparent); }

        #move-sequence {
            position: fixed;
            font-size: 4rem;
            color: #fff;
            font-style: italic;
            z-index: 200;
            display: none;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            pointer-events: none;
            text-align: center;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-spin {
            padding: 20px 50px;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #444, #222);
            border: 2px solid #555;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-spin:hover { background: #333; transform: scale(1.05); }

        #winBtn {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: transparent;
            border: 1px solid #333;
            color: #333;
            border-radius: 5px;
            cursor: pointer;
        }

        #winBtn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        #victory {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            text-align: center;
        }

        .shake { animation: shake 0.12s infinite; }
        @keyframes shake {
            0% { transform: translate(3px, 3px); }
            50% { transform: translate(-3px, -3px); }
            100% { transform: translate(3px, -3px); }
        }
    </style>
</head>
<body id="main">

    <h1 id="mainTitle">OPENING ROULETTE</h1>

    <div class="roulette-container">
        <div class="marker"></div>
        <div id="strip" class="strip"></div>
    </div>

    <div class="controls">
        <button id="winBtn" onclick="startSpin(true)">I WANT TO WIN</button>
        <button class="btn-spin" id="spinBtn" onclick="startSpin(false)">SPIN FOR GLORY</button>
    </div>

    <div id="move-sequence"></div>

    <div id="victory">
        <h2 id="vicName" style="font-size: 4rem; color: var(--primary); margin: 0;"></h2>
        <p id="vicMoves" style="font-size: 1.8rem; color: #aaa;"></p>
        <button onclick="location.reload()" style="padding: 15px 30px; margin-top: 30px; cursor:pointer;">REPLAY</button>
    </div>

    <script>
        const openings = [
            { n: "Caro-Kann", i: "🛡️", r: "rare", m: ["1. e4", "1... c6", "2. d4", "2... d5"] },
            { n: "Sicilian Defense", i: "🤌", r: "rare", m: ["1. e4", "1... c5", "2. Nf3", "2... d6"] },
            { n: "Scandinavian", i: "❄️", r: "common", m: ["1. e4", "1... d5", "2. exd5", "2... Qxd5"] },
            { n: "French Defense", i: "🥖", r: "common", m: ["1. e4", "1... e6", "2. d4", "2... d5"] },
            { n: "Berlin Defense", i: "🧱", r: "epic", m: ["1. e4", "1... e5", "2. Nf3", "2... Nc6", "3. Bb5", "3... Nf6"] },
            { n: "King's Gambit", i: "👑", r: "epic", m: ["1. e4", "1... e5", "2. f4!"] }
        ];

        const halloween = { n: "HALLOWEEN GAMBIT", i: "🎃", r: "gambit", m: ["1. e4", "1... e5", "2. Nf3", "2... Nc6", "3. Nc3", "3... Nf6", "4. Nxe5!!"] };

        const strip = document.getElementById('strip');
        const moveSeq = document.getElementById('move-sequence');
        const cardWidth = 190; 
        const winIndex = 80; // La carte qui s'arrêtera au milieu

        // Remplissage initial de la roulette
        function init() {
            for(let i=0; i<100; i++) {
                const op = openings[Math.floor(Math.random()*openings.length)];
                addCard(op);
            }
        }

        function addCard(op) {
            const card = document.createElement('div');
            card.className = `opening-card ${op.r}`;
            card.innerHTML = `<div class="opening-icon">${op.i}</div><div class="opening-name">${op.n}</div>`;
            strip.appendChild(card);
        }

        function startSpin(forceWin) {
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('winBtn').style.display = 'none';
            
            // Choix du gagnant
            let winner;
            if (forceWin) {
                winner = halloween;
            } else {
                // 10% de chance d'avoir le Halloween naturellement, sinon un au pif
                winner = Math.random() > 0.9 ? halloween : openings[Math.floor(Math.random()*openings.length)];
            }

            // Injecter le gagnant à la position cible
            const winCard = strip.children[winIndex];
            winCard.className = `opening-card ${winner.r}`;
            winCard.innerHTML = `<div class="opening-icon">${winner.i}</div><div class="opening-name">${winner.n}</div>`;

            // Animation de la roulette
            const offset = (winIndex * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
            strip.style.transform = `translateX(-${offset}px)`;

            // Attendre la fin de l'animation pour les coups
            setTimeout(() => showMoves(winner), 8200);
        }

        function showMoves(winner) {
            moveSeq.style.display = "block";
            if(winner.r === 'gambit') {
                moveSeq.style.color = "var(--primary)";
                moveSeq.style.textShadow = "0 0 30px var(--primary)";
            } else {
                moveSeq.style.color = "#fff";
                moveSeq.style.textShadow = "0 0 10px #fff";
            }

            let i = 0;
            const interval = setInterval(() => {
                moveSeq.innerText = winner.m[i];
                
                // Effet de secousse plus violent pour le Halloween
                if(winner.r === 'gambit' || i > 3) {
                    document.body.classList.add('shake');
                }
                
                // Flash couleur
                if(winner.r === 'gambit') {
                    document.body.style.backgroundColor = i % 2 === 0 ? "#2a0a00" : "#050505";
                }

                i++;
                if(i >= winner.m.length) {
                    clearInterval(interval);
                    setTimeout(() => triggerVictory(winner), 600);
                }
            }, 500);
        }

        function triggerVictory(winner) {
            document.body.classList.remove('shake');
            document.body.style.backgroundColor = "#050505";
            
            const vicDiv = document.getElementById('victory');
            document.getElementById('vicName').innerText = winner.n;
            document.getElementById('vicName').style.color = winner.r === 'gambit' ? 'var(--primary)' : 'var(--rare)';
            document.getElementById('vicMoves').innerText = winner.m.join(" ");
            
            vicDiv.style.display = "flex";
            
            // Confettis
            const count = winner.r === 'gambit' ? 200 : 50;
            const colors = winner.r === 'gambit' ? ['#ff6600', '#9d00ff', '#ffffff'] : ['#4b69ff', '#ffffff'];
            
            confetti({
                particleCount: count,
                spread: 70,
                origin: { y: 0.6 },
                colors: colors
            });
        }

        init();
    </script>
</body>
</html>
