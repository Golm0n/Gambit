<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHESS DOPAMINE - HALLOWEEN GAMBIT</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff6600;
            --secondary: #9d00ff;
            --bg: #050505;
            --card-bg: #151515;
            --text: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 20px var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }

        /* Roulette */
        .roulette-container {
            position: relative;
            width: 90vw;
            max-width: 900px;
            height: 160px;
            background: var(--card-bg);
            border: 5px solid #333;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 102, 0, 0.2);
        }

        .marker {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #fff;
            z-index: 100;
            box-shadow: 0 0 20px #fff;
            transform: translateX(-50%);
        }

        .strip {
            display: flex;
            position: absolute;
            left: 0;
            top: 10px;
            transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1);
        }

        .opening-card {
            width: 180px;
            height: 130px;
            margin: 0 5px;
            background: #222;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-bottom: 6px solid #444;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .opening-name { font-size: 0.9rem; margin-top: 10px; }
        .opening-icon { font-size: 2.5rem; }

        /* Raretés visuelles */
        .rare { border-bottom-color: #4b69ff; }
        .epic { border-bottom-color: #8847ff; }
        .gambit { border-bottom-color: var(--primary); background: linear-gradient(to top, rgba(255, 102, 0, 0.2), transparent); }

        /* Animation Coups Rapides */
        #move-sequence {
            position: fixed;
            font-size: 4rem;
            color: var(--primary);
            font-style: italic;
            z-index: 200;
            display: none;
            text-shadow: 0 0 30px var(--primary);
            pointer-events: none;
        }

        .btn-spin {
            margin-top: 40px;
            padding: 20px 50px;
            font-size: 1.8rem;
            background: linear-gradient(45deg, #ff4e00, #ec9f05);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 78, 0, 0.4);
        }

        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Overlay Victoire */
        #victory {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }
    </style>
</head>
<body id="main">

    <h1>OPENING ROULETTE</h1>

    <div class="roulette-container">
        <div class="marker"></div>
        <div class="strip" id="strip"></div>
    </div>

    <button class="btn-spin" id="spinBtn" onclick="startGambit()">SPIN FOR GLORY</button>

    <div id="move-sequence"></div>

    <div id="victory">
        <h2 style="font-size: 5rem; color: var(--primary);">HALLOWEEN GAMBIT</h2>
        <p style="font-size: 2rem;">1.e4 e5 2.Nf3 Nc6 3.Nc3 Nf6 4.Nxe5!!</p>
        <button onclick="location.reload()" style="padding: 15px 30px; margin-top: 20px;">REPLAY</button>
    </div>

    <script>
        const openings = [
            { n: "Caro-Kann", i: "🛡️", r: "rare" },
            { n: "King's Indian", i: "🕌", r: "epic" },
            { n: "Sicilian Defense", i: "🤌", r: "rare" },
            { n: "Scandinavian", i: "❄️", r: "common" },
            { n: "French Defense", i: "🥖", r: "common" },
            { n: "Berlin Defense", i: "🧱", r: "epic" }
        ];

        const strip = document.getElementById('strip');
        const moveSeq = document.getElementById('move-sequence');
        const cardWidth = 190; 

        // Initialisation
        for(let i=0; i<100; i++) {
            const op = openings[Math.floor(Math.random()*openings.length)];
            const card = document.createElement('div');
            card.className = `opening-card ${op.r}`;
            card.innerHTML = `<div class="opening-icon">${op.i}</div><div class="opening-name">${op.n}</div>`;
            strip.appendChild(card);
        }

        function startGambit() {
            document.getElementById('spinBtn').disabled = true;
            
            // On force l'item gagnant au milieu de la fin du scroll
            const winIndex = 80; 
            const winCard = strip.children[winIndex];
            winCard.className = "opening-card gambit";
            winCard.innerHTML = `<div class="opening-icon">🎃</div><div class="opening-name">HALLOWEEN GAMBIT</div>`;

            const offset = (winIndex * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
            strip.style.transform = `translateX(-${offset}px)`;

            setTimeout(showMoves, 8200);
        }

        function showMoves() {
            const moves = ["1. e4...", "1... e5", "2. Nf3...", "2... Nc6", "3. Nc3...", "3... Nf6", "4. Nxe5!!"];
            moveSeq.style.display = "block";
            let i = 0;

            const interval = setInterval(() => {
                moveSeq.innerText = moves[i];
                document.body.classList.add('shake');
                
                // Petit effet de flash chromatique
                document.body.style.backgroundColor = i % 2 === 0 ? "#1a0000" : "#050505";
                
                i++;
                if(i >= moves.length) {
                    clearInterval(interval);
                    setTimeout(triggerFinalVictory, 500);
                }
            }, 400);
        }

        function triggerFinalVictory() {
            document.body.classList.remove('shake');
            document.getElementById('victory').style.display = "flex";
            
            // Confettis de l'enfer
            const end = Date.now() + (5 * 1000);
            const colors = ['#ff6600', '#ffffff', '#9d00ff'];

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
