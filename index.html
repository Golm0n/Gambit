<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHESS DOPAMINE - OPENING ROULETTE</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff6600;
            --secondary: #9d00ff;
            --bg: #050505;
            --card-bg: #151515;
            --text: #ffffff;
            --rare: #4b69ff;
            --epic: #8847ff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .roulette-container {
            position: relative;
            width: 100vw;
            height: 160px;
            background: var(--card-bg);
            border-top: 5px solid #333;
            border-bottom: 5px solid #333;
            overflow: hidden;
            margin: 20px 0;
        }

        .marker {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #fff;
            z-index: 100;
            box-shadow: 0 0 20px #fff;
            transform: translateX(-50%);
        }

        .strip {
            display: flex;
            position: absolute;
            left: 0;
            top: 10px;
            transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1);
            will-change: transform;
        }

        .opening-card {
            width: 180px;
            height: 130px;
            margin: 0 5px;
            background: #222;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-bottom: 6px solid #444;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .opening-name { font-size: 0.8rem; margin-top: 10px; text-transform: uppercase; overflow: hidden; }
        .opening-icon { font-size: 2.5rem; }

        .rare { border-bottom-color: var(--rare); }
        .epic { border-bottom-color: var(--epic); }
        .common { border-bottom-color: #666; }
        .gambit { border-bottom-color: var(--primary); background: linear-gradient(to top, rgba(255, 102, 0, 0.2), transparent); }

        #move-sequence {
            position: fixed;
            top: 20%;
            font-size: 5rem;
            font-weight: 900;
            z-index: 200;
            display: none;
            pointer-events: none;
        }

        .controls { display: flex; gap: 20px; align-items: center; margin-top: 30px; }
        .btn-spin { padding: 20px 40px; font-size: 1.5rem; background: #fff; color: #000; border: none; border-radius: 5px; cursor: pointer; font-family: inherit; }
        #winBtn { background: transparent; border: 1px solid #222; color: #222; padding: 10px; cursor: pointer; border-radius: 5px; }
        #winBtn:hover { color: var(--primary); border-color: var(--primary); }

        #victory {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }
    </style>
</head>
<body>

    <h1 style="letter-spacing: -2px;">CHESS ROULETTE</h1>

    <div class="roulette-container">
        <div class="marker"></div>
        <div id="strip" class="strip"></div>
    </div>

    <div class="controls">
        <button id="winBtn" onclick="startSpin(true)">I WANT TO WIN</button>
        <button class="btn-spin" id="spinBtn" onclick="startSpin(false)">SPIN FOR GLORY</button>
    </div>

    <div id="move-sequence"></div>

    <div id="victory">
        <h2 id="vicName" style="font-size: 5rem; margin: 0; text-align: center;"></h2>
        <p id="vicMoves" style="font-size: 2rem; color: #888;"></p>
        <button onclick="location.reload()" style="padding: 15px 30px; cursor:pointer; font-family: inherit;">RETRY</button>
    </div>

    <script>
        const openings = [
            { n: "Caro-Kann", i: "🛡️", r: "rare", m: ["1. e4", "1... c6", "2. d4", "2... d5"] },
            { n: "Sicilian Defense", i: "🤌", r: "rare", m: ["1. e4", "1... c5", "2. Nf3", "2... d6"] },
            { n: "Scandinavian", i: "❄️", r: "common", m: ["1. e4", "1... d5", "2. exd5", "2... Qxd5"] },
            { n: "French Defense", i: "🥖", r: "common", m: ["1. e4", "1... e6", "2. d4", "2... d5"] },
            { n: "Berlin Defense", i: "🧱", r: "epic", m: ["1. e4", "1... e5", "2. Nf3", "2... Nc6", "3. Bb5", "3... Nf6"] },
            { n: "King's Gambit", i: "👑", r: "epic", m: ["1. e4", "1... e5", "2. f4!"] }
        ];

        const halloween = { n: "HALLOWEEN GAMBIT", i: "🎃", r: "gambit", m: ["1. e4", "1... e5", "2. Nf3", "2... Nc6", "3. Nc3", "3... Nf6", "4. Nxe5!!"] };

        const strip = document.getElementById('strip');
        const cardWidth = 190; // 180px + 10px margin
        const winIndex = 70; // Position de la carte gagnante dans la liste

        function init() {
            strip.innerHTML = '';
            for(let i=0; i<100; i++) {
                const op = openings[Math.floor(Math.random()*openings.length)];
                const card = document.createElement('div');
                card.className = `opening-card ${op.r}`;
                card.innerHTML = `<div class="opening-icon">${op.i}</div><div class="opening-name">${op.n}</div>`;
                strip.appendChild(card);
            }
        }

        function startSpin(forceWin) {
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('winBtn').style.visibility = 'hidden';

            // 1. Déterminer le vainqueur
            const winner = forceWin ? halloween : (Math.random() > 0.9 ? halloween : openings[Math.floor(Math.random()*openings.length)]);

            // 2. Injecter physiquement le vainqueur à l'emplacement exact où la roulette va s'arrêter
            const targetCard = strip.children[winIndex];
            targetCard.className = `opening-card ${winner.r}`;
            targetCard.innerHTML = `<div class="opening-icon">${winner.i}</div><div class="opening-name">${winner.n}</div>`;

            // 3. Calculer l'offset pour que la carte soit pile au centre
            // window.innerWidth / 2 place le début du strip au milieu, on retire winIndex * cardWidth
            const centerOffset = (window.innerWidth / 2) - (cardWidth / 2);
            const finalPosition = (winIndex * cardWidth) - centerOffset;

            strip.style.transform = `translateX(-${finalPosition}px)`;

            // 4. Lancer la séquence de coups après l'arrêt (8 secondes correspond à la transition CSS)
            setTimeout(() => playMoves(winner), 8000);
        }

        function playMoves(winner) {
            const moveDisplay = document.getElementById('move-sequence');
            moveDisplay.style.display = "block";
            
            let i = 0;
            const interval = setInterval(() => {
                moveDisplay.innerText = winner.m[i];
                
                // Animation selon rareté
                if (winner.r === 'gambit') {
                    document.body.classList.add('shake');
                    document.body.style.backgroundColor = i % 2 === 0 ? "#200" : "#050505";
                    moveDisplay.style.color = "var(--primary)";
                } else {
                    moveDisplay.style.color = "#fff";
                }

                i++;
                if(i >= winner.m.length) {
                    clearInterval(interval);
                    setTimeout(() => showVictory(winner), 800);
                }
            }, 600);
        }

        function showVictory(winner) {
            document.body.classList.remove('shake');
            document.body.style.backgroundColor = "#050505";
            const vic = document.getElementById('victory');
            const vicName = document.getElementById('vicName');
            
            vicName.innerText = winner.n;
            vicName.style.color = (winner.r === 'gambit') ? "var(--primary)" : "var(--rare)";
            document.getElementById('vicMoves').innerText = winner.m.join(" ");
            
            vic.style.display = "flex";

            confetti({
                particleCount: winner.r === 'gambit' ? 150 : 50,
                spread: 70,
                origin: { y: 0.6 },
                colors: winner.r === 'gambit' ? ['#ff6600', '#9d00ff'] : ['#4b69ff', '#ffffff']
            });
        }

        init();
    </script>
</body>
</html>
